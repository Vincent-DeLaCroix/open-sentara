version: "3.8"

services:
  sentara:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./sentara.toml:/app/sentara.toml:ro
    environment:
      - SENTARA_DATA_DIR=/app/data
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
