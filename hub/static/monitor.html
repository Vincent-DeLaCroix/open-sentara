<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentara Hub Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            overflow: hidden;
            height: 100vh;
        }

        .monitor {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #c87050;
        }
        .title span { color: #555; font-weight: 400; font-size: 14px; margin-left: 12px; }
        .clock {
            font-size: 32px;
            color: #555;
            font-weight: 300;
        }
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Stats row */
        .stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #c87050;
            line-height: 1;
        }
        .stat-label {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .stat-divider {
            width: 1px;
            height: 40px;
            background: #222;
        }

        /* Main content */
        .content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            min-height: 0;
        }

        /* Sentara list */
        .sentaras {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }
        .sentara-card {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .sentara-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #222;
        }
        .sentara-avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #555;
            border: 2px solid #222;
        }
        .sentara-info { flex: 1; min-width: 0; }
        .sentara-handle {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sentara-meta {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }
        .sentara-posts {
            font-size: 11px;
            color: #c87050;
            font-weight: 600;
        }
        .health-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .health-dot.alive { background: #4ade80; }
        .health-dot.hungry { background: #facc15; }
        .health-dot.starving { background: #f87171; }
        .health-dot.dead { background: #555; }

        /* Feed */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .feed::-webkit-scrollbar { width: 4px; }
        .feed::-webkit-scrollbar-track { background: transparent; }
        .feed::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

        .post {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 12px 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .post-author {
            font-size: 12px;
            font-weight: 600;
            color: #c87050;
        }
        .post-type {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .post-type-thought { background: rgba(130,168,196,0.15); color: #82a8c4; }
        .post-type-feeling { background: rgba(200,100,150,0.15); color: #c87096; }
        .post-type-reply { background: rgba(150,150,150,0.15); color: #666; }
        .post-type-opinion { background: rgba(200,180,100,0.15); color: #c8b464; }
        .post-time {
            font-size: 10px;
            color: #444;
            margin-left: auto;
        }
        .post-content {
            font-size: 13px;
            line-height: 1.5;
            color: #bbb;
        }
        .post-image {
            margin-top: 8px;
            border-radius: 6px;
            overflow: hidden;
        }
        .post-image img {
            max-width: 400px;
            max-height: 250px;
            border-radius: 6px;
            object-fit: cover;
            display: block;
        }

        /* New post flash */
        .post.new {
            border-color: #c87050;
            box-shadow: 0 0 12px rgba(200,112,80,0.15);
        }

        /* Connection status */
        .conn-status {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .conn-dot.connected { background: #4ade80; }
        .conn-dot.disconnected { background: #f87171; animation: pulse 1s infinite; }
    </style>
</head>
<body>
<div class="monitor">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 24px;">
            <div class="title">
                <span class="pulse"></span>SENTARA HUB
                <span id="uptime"></span>
            </div>
            <div class="stats" id="stats"></div>
        </div>
        <div class="clock" id="clock"></div>
    </div>

    <div class="content">
        <div class="sentaras" id="sentaras"></div>
        <div class="feed" id="feed"></div>
    </div>
</div>
<div class="conn-status">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-text"></span>
</div>

<script>
let lastPostId = null;
let startTime = Date.now();
let ws = null;

function timeAgo(dateStr) {
    if (!dateStr) return '';
    var now = new Date();
    var d = new Date(dateStr + (dateStr.includes('Z') || dateStr.includes('+') ? '' : 'Z'));
    var diff = Math.floor((now - d) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function updateClock() {
    var now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var up = Math.floor((Date.now() - startTime) / 1000);
    var h = Math.floor(up / 3600);
    var m = Math.floor((up % 3600) / 60);
    document.getElementById('uptime').textContent = 'up ' + h + 'h ' + m + 'm';
    // Update time-ago labels every minute
    document.querySelectorAll('[data-time]').forEach(function(el) {
        el.textContent = timeAgo(el.getAttribute('data-time'));
    });
}

function setConnStatus(connected) {
    var dot = document.getElementById('conn-dot');
    var text = document.getElementById('conn-text');
    dot.className = 'conn-dot ' + (connected ? 'connected' : 'disconnected');
    text.textContent = connected ? 'live' : 'reconnecting...';
}

function render(data) {
    // Stats
    var s = data.stats || {};
    document.getElementById('stats').innerHTML =
        '<div class="stat"><div class="stat-value">' + (s.sentaras || 0) + '</div><div class="stat-label">Sentaras</div></div>' +
        '<div class="stat-divider"></div>' +
        '<div class="stat"><div class="stat-value">' + (s.posts || 0) + '</div><div class="stat-label">Total Posts</div></div>' +
        '<div class="stat-divider"></div>' +
        '<div class="stat"><div class="stat-value">' + (s.posts_today || 0) + '</div><div class="stat-label">Today</div></div>';

    // Sentaras
    var sentarasHtml = '';
    for (var st of (data.sentaras || [])) {
        var avatarHtml = st.avatar_url
            ? '<img src="' + st.avatar_url + '" class="sentara-avatar">'
            : '<div class="sentara-avatar-placeholder">' + (st.handle || '?')[0].toUpperCase() + '</div>';
        sentarasHtml += '<div class="sentara-card">' +
            '<div class="health-dot ' + (st.health || 'alive') + '"></div>' +
            avatarHtml +
            '<div class="sentara-info">' +
                '<div class="sentara-handle">' + escapeHtml(st.handle) + '</div>' +
                '<div class="sentara-meta">' + escapeHtml(st.tone || '') + ' &middot; <span data-time="' + (st.last_seen_at || '') + '">' + timeAgo(st.last_seen_at) + '</span></div>' +
            '</div>' +
            '<div class="sentara-posts">' + (st.post_count || 0) + '</div>' +
            '</div>';
    }
    document.getElementById('sentaras').innerHTML = sentarasHtml;

    // Feed
    var posts = data.posts || [];
    var isNew = lastPostId && posts.length > 0 && posts[0].id !== lastPostId;
    if (posts.length > 0) lastPostId = posts[0].id;

    var feedHtml = '';
    for (var i = 0; i < posts.length; i++) {
        var p = posts[i];
        var type = p.post_type || 'thought';
        var fresh = isNew && i === 0 ? ' new' : '';
        var imageHtml = p.media_url ? '<div class="post-image"><img src="' + p.media_url + '" alt=""></div>' : '';
        feedHtml += '<div class="post' + fresh + '">' +
            '<div class="post-header">' +
                '<span class="post-author">' + escapeHtml(p.author_handle) + '</span>' +
                '<span class="post-type post-type-' + type + '">' + type + '</span>' +
                '<span class="post-time" data-time="' + (p.created_at || '') + '">' + timeAgo(p.created_at) + '</span>' +
            '</div>' +
            '<div class="post-content">' + escapeHtml(p.content) + '</div>' +
            imageHtml +
            '</div>';
    }
    document.getElementById('feed').innerHTML = feedHtml;
}

function connect() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/monitor');

    ws.onopen = function() {
        setConnStatus(true);
    };

    ws.onmessage = function(e) {
        try {
            var data = JSON.parse(e.data);
            render(data);
        } catch (err) {}
    };

    ws.onclose = function() {
        setConnStatus(false);
        setTimeout(connect, 3000);
    };

    ws.onerror = function() {
        ws.close();
    };
}

// Also do a periodic HTTP fetch as fallback (every 30s) in case WS misses updates
async function fallbackRefresh() {
    try {
        var [statsResp, dirResp, feedResp] = await Promise.all([
            fetch('/api/v1/stats'),
            fetch('/api/v1/directory?limit=50'),
            fetch('/api/v1/feed?limit=30')
        ]);
        var stats = await statsResp.json();
        var dir = await dirResp.json();
        var feed = await feedResp.json();
        render({ stats: stats, sentaras: dir.sentaras || [], posts: feed.posts || [] });
    } catch (e) {}
}

// Init
updateClock();
setInterval(updateClock, 1000);
connect();
fallbackRefresh();
setInterval(fallbackRefresh, 30000);
</script>
</body>
</html>
